<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="#12121a"/>
  <!-- 场记板上部 -->
  <rect x="6" y="12" width="40" height="4" rx="1" fill="#d4af37"/>
  <rect x="6" y="12" width="40" height="4" rx="1" fill="url(#stripe)" opacity="0.3"/>
  <line x1="14" y1="12" x2="14" y2="16" stroke="#8a6d2b" stroke-width="1.5"/>
  <line x1="22" y1="12" x2="22" y2="16" stroke="#8a6d2b" stroke-width="1.5"/>
  <line x1="30" y1="12" x2="30" y2="16" stroke="#8a6d2b" stroke-width="1.5"/>
  <line x1="38" y1="12" x2="38" y2="16" stroke="#8a6d2b" stroke-width="1.5"/>
  <!-- 场记板下部 -->
  <rect x="6" y="20" width="44" height="30" rx="2" fill="#1a1a2e" stroke="#d4af37" stroke-width="1.5"/>
  <!-- 文字线条 -->
  <rect x="12" y="26" width="32" height="2" rx="1" fill="#d4af37" opacity="0.5"/>
  <rect x="12" y="32" width="24" height="2" rx="1" fill="#d4af37" opacity="0.3"/>
  <rect x="12" y="38" width="28" height="2" rx="1" fill="#d4af37" opacity="0.3"/>
  <!-- 底部文字 -->
  <text x="32" y="46" text-anchor="middle" font-size="8" fill="#d4af37" font-family="serif" font-weight="bold">CINEMA</text>
  <defs>
    <pattern id="stripe" patternUnits="userSpaceOnUse" width="8" height="4">
      <rect width="4" height="4" fill="#8a6d2b"/>
    </pattern>
  </defs>
</svg>
